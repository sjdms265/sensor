spring:
  application:
    name: sensorai
  ai:
    ollama:
      base-url: http://localhost:11434
      chat.options:
        model: llama3.2
        temperature: 0.4
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-sonnet-4-6
          # SYSTEM_AND_TOOLS is bound directly to AnthropicChatModel by Spring Boot auto-config,
          # ensuring cache_control is applied even if ChatClient option-merging drops AnthropicChatOptions.
          cache-options:
            strategy: SYSTEM_AND_TOOLS
    chat:
      client:
        enabled: false
#    active-model: ollama
    active-model: anthropic

server:
  port: 8083
#  servlet:
#    context-path: /sensorai

sensor-manager.url: http://localhost:8090/temperaturesensor/graphql

eureka:
  client:
    #        enabled: false
    serviceUrl:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: localhost

mcp.sensor-mcp-server.base-url: http://localhost:8084

# Log raw Anthropic HTTP requests/responses (includes cache_creation_input_tokens / cache_read_input_tokens).
# Spring AI 1.1.2 does not expose getNativeUsage() for Anthropic, so this is the only reliable way
# to observe whether prompt caching is active.
logging:
  level:
    org.springframework.ai.anthropic: DEBUG
